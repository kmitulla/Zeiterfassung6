<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RAS Zeit">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-32.png">
<title>RAS Zeiterfassung</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222f;--text:#e8e8f0;--text2:#9898aa;--text3:#686878;--blue:#4a90d9;--blue2:#3b7dd4;--blue-glow:rgba(74,144,217,0.15);--green:#34d399;--green-bg:rgba(52,211,153,0.12);--green-bdr:rgba(52,211,153,0.5);--red:#f87171;--red-bg:rgba(248,113,113,0.12);--orange:#fb923c;--orange-bg:rgba(251,146,60,0.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12);--yellow:#fbbf24;--yellow-bg:rgba(251,191,36,0.12);--pink:#f472b6;--teal:#2dd4bf;--radius:12px;--rs:8px;--rl:16px;--shadow:0 4px 24px rgba(0,0,0,0.3);--tr:0.25s cubic-bezier(0.4,0,0.2,1)}
html{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden;height:100%}
body{height:100%;overflow:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);color:var(--text);border-radius:var(--rs);padding:10px 14px;outline:none;transition:var(--tr);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes stampPulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,0.35)}70%{box-shadow:0 0 0 20px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
@keyframes stampShimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes stampPress{0%{transform:scale(1)}30%{transform:scale(0.86)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes clockedPulse{0%,100%{border-color:var(--red);box-shadow:0 0 15px rgba(248,113,113,0.12)}50%{border-color:rgba(248,113,113,0.35);box-shadow:0 0 40px rgba(248,113,113,0.18)}}
@keyframes chartBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes donutDraw{from{stroke-dasharray:0 100}to{stroke-dasharray:var(--val) 100}}
@keyframes currentKW{0%,100%{box-shadow:0 0 0 2px var(--red)}50%{box-shadow:0 0 12px 2px rgba(248,113,113,0.3)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wobble{0%{transform:scale(1)}25%{transform:scale(1.08) rotate(2deg)}50%{transform:scale(1.08) rotate(-2deg)}75%{transform:scale(1.05)}100%{transform:scale(1)}}

#root{height:100%;display:flex;flex-direction:column}
.hdr{background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.05);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;padding-top:max(12px,env(safe-area-inset-top))}
.hdr h1{font-size:16px;font-weight:600;letter-spacing:.3px}
.hdr .ub{font-size:12px;color:var(--text2)}
.ha{display:flex;gap:8px;align-items:center}
.hb{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--tr);background:var(--bg3)}
.hb:active{transform:scale(.9)}
.hb svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.mc{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + max(8px,env(safe-area-inset-bottom)))}
.pg{display:none;padding:16px;max-width:900px;margin:0 auto;width:100%}
.pg.active{display:block}
.pt{font-size:22px;font-weight:600;margin-bottom:20px}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid rgba(255,255,255,0.05);display:flex;z-index:100;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;font-size:10px;color:var(--text2);gap:3px;transition:all .3s ease;position:relative}
.ni.active{color:var(--blue)}
.ni.active::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:var(--blue);border-radius:0 0 2px 2px}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.cd{background:var(--bg2);border-radius:var(--rl);padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.04);animation:fadeIn .35s ease both}
.ct{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius);font-weight:500;font-size:14px;transition:all .2s ease}
.btn:active{transform:scale(.96)}
.bp{background:var(--blue);color:white}
.bg{background:var(--bg3);color:var(--text)}
.bd{background:var(--red);color:white}
.bs{padding:8px 16px;font-size:13px;border-radius:var(--rs)}
.bw{width:100%}

/* Stamp */
.ss{text-align:center;padding:20px 0}
.sb{width:170px;height:170px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;margin:0 auto;transition:all .3s ease;position:relative;overflow:hidden}
.sb .shim{position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.07) 50%,transparent 70%);background-size:200% 100%;animation:stampShimmer 3s ease-in-out infinite;border-radius:50%;pointer-events:none}
.sb.si{background:linear-gradient(135deg,rgba(52,211,153,.1),rgba(52,211,153,.02));border:2px solid var(--green);color:var(--green);animation:stampPulse 2.5s infinite}
.sb.si:active{animation:stampPress .5s ease}
.sb.so{background:linear-gradient(135deg,rgba(248,113,113,.1),rgba(248,113,113,.02));border:2px solid var(--red);color:var(--red);animation:clockedPulse 3s infinite}
.sb.so:active{animation:stampPress .5s ease}
.sc{font-size:22px;font-weight:600;line-height:1;letter-spacing:-.5px}
.sd{font-size:10px;opacity:.7;font-weight:300}
.sl{font-size:13px;font-weight:500;margin-top:4px}
.sst{font-size:13px;color:var(--text2);margin-top:14px}
.sti{font-size:12px;color:var(--text2);opacity:.7}
.mb{color:var(--text2);font-size:12px;margin-top:10px;padding:8px 16px;display:inline-flex;align-items:center;gap:6px;border-radius:var(--rs);transition:var(--tr);border:1px solid rgba(255,255,255,0.06)}
.mb:hover{background:var(--bg3)}
.csb{color:var(--red);font-size:12px;margin-top:8px;padding:8px 16px;display:inline-flex;align-items:center;gap:6px;border-radius:var(--rs);border:1px solid rgba(248,113,113,.2);transition:var(--tr)}
.csb:hover{background:var(--red-bg)}
.nachb{color:var(--text2);font-size:12px;margin-top:6px;padding:8px 16px;display:inline-flex;align-items:center;gap:6px;border-radius:var(--rs);border:1px solid rgba(255,255,255,0.08);transition:var(--tr);background:var(--bg3)}
.nachb:hover{background:var(--bg4)}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:.3s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.mo.active{opacity:1;visibility:visible}
.ml{background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));transform:translateY(100%);transition:.4s cubic-bezier(.4,0,.2,1)}
.mo.active .ml{transform:translateY(0)}
.mh{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px}
.mt{font-size:18px;font-weight:600;margin-bottom:16px}
.ma{display:flex;gap:10px;margin-top:20px}.ma .btn{flex:1}
.fg{margin-bottom:16px}
.fl{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.fr{display:flex;gap:10px}.fr>*{flex:1;min-width:0}
.pc{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pi{padding:7px 12px;border-radius:18px;font-size:12px;background:var(--bg3);border:1px solid rgba(255,255,255,.06);transition:var(--tr)}
.pi:hover,.pi.sel{background:var(--blue);color:white;border-color:var(--blue)}

/* Calendar */
.csk{position:sticky;top:0;z-index:10;background:var(--bg);padding-bottom:6px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ch h3{font-size:18px;font-weight:600}
.cn{display:flex;gap:6px}
.cn button{width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.cn button:active{transform:scale(.88)}
.cn svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cdh{text-align:center;font-size:10px;color:var(--text2);padding:3px 0;font-weight:500}
.cdy{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:var(--rs);position:relative;transition:all .2s ease;cursor:pointer;max-width:36px}
.cdy:hover{background:var(--bg3)}
.cdy.we{color:var(--text2);opacity:.5}
.cdy.hol{color:var(--orange);font-weight:500;opacity:1}
.cdy.today{border:2px solid var(--blue)}
.cdy.stpd{box-shadow:inset 0 0 0 2px var(--green-bdr)}
.cdy.vacation{background:var(--blue);color:white}.cdy.vacation-half{background:linear-gradient(135deg,var(--blue) 50%,transparent 50%);color:white}
.cdy.sick{background:var(--red);color:white}.cdy.homeoffice{background:var(--purple);color:white}
.cdy.flexday{background:var(--yellow);color:var(--bg)}.cdy.business{background:var(--teal);color:var(--bg)}
.cdy.carryover{background:var(--pink);color:white}.cdy.carryover-half{background:linear-gradient(135deg,var(--pink) 50%,transparent 50%);color:white}
.cdy.em{opacity:.15;pointer-events:none}
.cleg{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);padding:3px 7px;border-radius:14px;background:var(--bg3);cursor:pointer;transition:var(--tr);border:2px solid transparent;white-space:nowrap}
.li.active{border-color:var(--blue);color:var(--text)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Stats */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px;transition:all .4s ease}
.sg.cmp .sk{padding:5px 7px}.sg.cmp .sv{font-size:14px}.sg.cmp .slb{font-size:7px}
.sk{background:var(--bg3);border-radius:var(--radius);padding:10px;border:1px solid rgba(255,255,255,.04);transition:all .3s ease;animation:fadeIn .35s ease both;position:relative}
.sv{font-size:18px;font-weight:600;letter-spacing:-.5px}
.slb{font-size:9px;color:var(--text2);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.sk.pos .sv{color:var(--green)}.sk.neg .sv{color:var(--red)}
.sdl{position:absolute;top:2px;right:4px;font-size:9px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px}

/* Week */
.wsk{position:sticky;top:0;z-index:20;background:var(--bg);padding:6px 0}
.wyn{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.wyn h3{font-size:18px;font-weight:600}
.tb{display:flex;gap:3px;background:var(--bg3);border-radius:var(--radius);padding:3px;overflow-x:auto;flex-shrink:0}
.ti{padding:5px 10px;border-radius:var(--rs);font-size:11px;font-weight:500;white-space:nowrap;transition:var(--tr);color:var(--text2);flex-shrink:0}
.ti.active{background:var(--blue);color:white}
.cto{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.cto button{padding:3px 8px;border-radius:10px;font-size:10px;background:var(--bg4);color:var(--text2);transition:var(--tr);border:1px solid transparent}
.cto button.active{background:var(--blue);color:white}
.wt{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}
.wt th{text-align:left;padding:5px 4px;color:var(--text2);font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.06);background:var(--bg2);white-space:nowrap}
.wt td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap}
.wt tr{cursor:pointer;transition:background .15s}
.wt tr:hover td{background:rgba(255,255,255,.02)}
.bdg{display:inline-block;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:500}
.bdg-g{background:var(--green-bg);color:var(--green)}.bdg-r{background:var(--red-bg);color:var(--red)}.bdg-o{background:var(--orange-bg);color:var(--orange)}.bdg-b{background:var(--blue-glow);color:var(--blue)}.bdg-p{background:var(--purple-bg);color:var(--purple)}
.kwcard{animation:fadeIn .3s ease both;scroll-margin-top:140px}
.kwcard.current-kw{animation:currentKW 3s ease-in-out infinite;border-radius:var(--rl)}

/* Charts */
.chb{background:var(--bg3);border-radius:var(--radius);padding:14px;margin-bottom:12px;overflow:hidden}
.cht{font-size:13px;font-weight:500;margin-bottom:10px}
.bc{display:flex;align-items:flex-end;gap:3px;height:120px;padding-top:8px}
.bar{flex:1;border-radius:3px 3px 0 0;position:relative;min-width:0;transform-origin:bottom;animation:chartBar .7s cubic-bezier(.34,1.56,.64,1) both;cursor:pointer;transition:opacity .15s}
.bar:hover{opacity:.8}
.brl{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--text2);white-space:nowrap}
.brt{position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .2s;border:1px solid rgba(255,255,255,.1);z-index:5;pointer-events:none}
.bar:hover .brt{opacity:1}

/* Login */
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:20px;background:var(--bg);width:100%}
.lc{width:100%;max-width:360px;text-align:center;animation:slideUp .5s ease both}
.ltl{font-size:24px;font-weight:600;margin-bottom:4px}
.lsb{font-size:14px;color:var(--text2);margin-bottom:32px}
.lf{text-align:left}.lf .fg{margin-bottom:14px}.lf input{padding:14px 16px;font-size:15px;border-radius:var(--radius)}
.lh{font-size:13px;color:var(--blue);margin-top:8px;text-align:center}
.ll{display:flex;justify-content:center;gap:16px;margin-top:16px}.ll button{font-size:13px;color:var(--text2)}

/* Settings */
.sse{margin-bottom:20px}
.sst2{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:500}
.sit{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:12px}
.sil{font-size:14px;flex-shrink:0}
.siv{text-align:right;flex-shrink:0}
.siv input,.siv select{width:130px;text-align:right;padding:8px 10px}

.eo{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg3);border-radius:var(--rs);margin-bottom:6px;cursor:pointer;transition:var(--tr);font-size:13px}
.eo:hover{background:var(--bg4)}.eo input[type=radio]{accent-color:var(--blue);width:auto;flex-shrink:0}.eo label{flex:1;cursor:pointer}

.toast{position:fixed;top:max(20px,env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg3);color:var(--text);padding:12px 24px;border-radius:var(--radius);font-size:14px;z-index:2000;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.08);transition:.4s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.success{border-color:rgba(52,211,153,.3)}.toast.error{border-color:rgba(248,113,113,.3)}

.ui{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border-radius:var(--rs);margin-bottom:6px}

/* Draggable KPI */
.sk.dragging{opacity:.5;transform:scale(.95)}

/* Zoom controls */
.zoom-ctrl{position:fixed;bottom:90px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:50}
.zoom-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:var(--tr)}
.zoom-btn:hover{background:var(--bg4)}

@media(min-width:768px){
  .bn{left:50%;transform:translateX(-50%);max-width:500px;border-radius:var(--rl) var(--rl) 0 0;border:1px solid rgba(255,255,255,.05);border-bottom:none}
  .mc{padding-bottom:calc(80px + max(8px,env(safe-area-inset-bottom)))}.pg{padding:24px}
  .sg{grid-template-columns:repeat(4,1fr)}
  .mo .ml{border-radius:var(--rl)}.mo{align-items:center}.ml{transform:translateY(30px);max-height:80vh}.mo.active .ml{transform:translateY(0)}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script>
const U={
  S:n=>String(n).padStart(2,'0'),
  now(){return new Date(new Date().toLocaleString('en-US',{timeZone:A.tz()}))},
  fD(d){if(typeof d==='string')d=new Date(d);return this.S(d.getDate())+'.'+this.S(d.getMonth()+1)+'.'+d.getFullYear()},
  fT(d){if(typeof d==='string')d=new Date(d);return this.S(d.getHours())+':'+this.S(d.getMinutes())},
  dk(d){if(typeof d==='string')return d;return d.getFullYear()+'-'+this.S(d.getMonth()+1)+'-'+this.S(d.getDate())},
  pdk(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)},
  wd(d){return['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()]},
  wdL(d){return['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][d.getDay()]},
  isWE(d){return d.getDay()===0||d.getDay()===6},
  getKW(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));return Math.ceil(((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/864e5+1)/7)},
  getKWY(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));return dt.getUTCFullYear()},
  toast(m,t=''){const e=document.getElementById('toast');if(!e)return;e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',2800)}
};

const HOL={
  easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31)-1,da=((h+l-7*m+114)%31)+1;return new Date(y,mo,da)},
  bw(y){const h={},ad=(m,d,n)=>{h[y+'-'+U.S(m)+'-'+U.S(d)]=n};ad(1,1,'Neujahr');ad(1,6,'Hl. Drei Könige');ad(5,1,'Tag der Arbeit');ad(10,3,'Tag der Dt. Einheit');ad(11,1,'Allerheiligen');ad(12,25,'1. Weihnachtstag');ad(12,26,'2. Weihnachtstag');const e=this.easter(y),a=n=>{const r=new Date(e);r.setDate(r.getDate()+n);return r},f=d=>U.dk(d);h[f(a(-2))]='Karfreitag';h[f(a(1))]='Ostermontag';h[f(a(39))]='Christi Himmelfahrt';h[f(a(50))]='Pfingstmontag';h[f(a(60))]='Fronleichnam';return h},
  get(y){const u=A.d().holidays&&A.d().holidays[y];return(u&&Object.keys(u).length)?u:this.bw(y)},
  is(k){return this.get(parseInt(k.split('-')[0]))[k]||false}
};

  dH(){return((this._d.settings&&this._d.settings.weekHours)||40)/5},
  getCE(k){return this._d.calendar&&this._d.calendar[k]},
  hasS(k){return this._d.stamps&&this._d.stamps[k]&&this._d.stamps[k].length>0},
  getVac(y){const s=this._d.settings&&this._d.settings.yearSettings&&this._d.settings.yearSettings[y];return(s&&s.vacDays!=null)?s.vacDays:30},
  getCO(y){const s=this._d.settings&&this._d.settings.yearSettings&&this._d.settings.yearSettings[y];return(s&&s.carryOver)||0},

  // Multi-day pause
  openPause(){
    const ud=A.d(),inT=new Date(ud.currentStamp),outT=U.now();
    this._multiIn=inT;this._multiOut=outT;
    this._startSplit()
  },
  _startSplit(){
    const inT=this._multiIn,outT=this._multiOut;
    const days=[];const d=new Date(inT);d.setHours(0,0,0,0);const od=new Date(outT);od.setHours(0,0,0,0);
    while(d<=od){days.push(U.dk(d));d.setDate(d.getDate()+1)}
    this._days=days;
    if(days.length===1){this._showSingle()}else{this._showMulti(days,inT,outT)}
  },
  _showSingle(){
    this.sp=null;const ud=A.d(),pr=[0,10,15,20,30,40,45,50,60],up=ud.pausePresets||[],all=[...new Set([...pr,...up])].sort((a,b)=>a-b);
    document.getElementById('pChips').innerHTML=all.map(p=>`<button class="pi" onclick="ST.sp=${p};this.parentElement.querySelectorAll('.pi').forEach(c=>c.classList.remove('sel'));this.classList.add('sel');document.getElementById('cPause').value=''">${p}m</button>`).join('');
    document.getElementById('cPause').value='';
    document.getElementById('singlePA').style.display='';document.getElementById('multiPA').style.display='none';document.getElementById('multiPA').innerHTML='';
    MO.open('pauseO')
  },
  _showMulti(days,inT,outT){
    document.getElementById('singlePA').style.display='none';const mp=document.getElementById('multiPA');mp.style.display='';
    let h='<div style="font-size:13px;color:var(--text2);margin-bottom:10px">Mehrere Tage – Pause pro Tag:</div>';
    days.forEach((dk,i)=>{
      const dd=U.pdk(dk);let from='00:00',to='24:00';
      if(i===0)from=U.fT(inT);if(i===days.length-1)to=U.fT(outT);
      h+=`<div style="background:var(--bg3);padding:8px 10px;border-radius:var(--rs);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between"><div><b>${U.wd(dd)}</b> ${U.fD(dd)}<br><span style="font-size:10px;color:var(--text2)">${from}–${to}</span></div><div style="display:flex;align-items:center;gap:4px"><input type="number" id="mp_${i}" value="0" min="0" style="width:60px;text-align:center;padding:6px" inputmode="numeric"><span style="font-size:11px;color:var(--text2)">min</span></div></div>`
    });
    mp.innerHTML=h;MO.open('pauseO')
  },
  async confirmPause(){
    const ud=A.d(),days=this._days,inT=this._multiIn,outT=this._multiOut;
    if(!days||!days.length)return;
    const stamps=ud.stamps||{};
    if(days.length===1){
      let p=this.sp;const cv=document.getElementById('cPause').value;if(cv!=='')p=parseInt(cv)||0;if(p===null)p=0;
      const dk=days[0];if(!stamps[dk])stamps[dk]=[];
      stamps[dk].push({in:ud.currentStamp||inT.toISOString(),out:outT.toISOString(),pause:p})
    }else{
      for(let i=0;i<days.length;i++){
        const dk=days[i],ds=U.pdk(dk);let si,so;
        if(i===0){si=inT;so=new Date(ds);so.setHours(23,59,0,0)}
        else if(i===days.length-1){si=new Date(ds);si.setHours(0,0,0,0);so=outT}
        else{si=new Date(ds);si.setHours(0,0,0,0);so=new Date(ds);so.setHours(23,59,0,0)}
        const pe=document.getElementById('mp_'+i);const p=pe?(parseInt(pe.value)||0):0;
        if(!stamps[dk])stamps[dk]=[];stamps[dk].push({in:si.toISOString(),out:so.toISOString(),pause:p})
      }
    }
    await db.collection('users').doc(A.user).update({stamps,currentStamp:firebase.firestore.FieldValue.delete()});
    MO.close('pauseO');U.toast('Ausgestempelt!','success')

async function init(){
  renderApp();await DB.ensure();
  document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')AUTH.login()});
  document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus()});
  document.getElementById('loginUser').addEventListener('input',async function(){const u=this.value.trim();if(!u||u==='admin'){document.getElementById('loginHint').style.display='none';return}const d=await DB.get(u);document.getElementById('loginHint').style.display=d?'none':'block';if(!d)document.getElementById('loginHint').textContent='Neu hier? Vergebe ein Passwort und melde dich an.'});
  document.addEventListener('touchstart',e=>{if(!['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))document.activeElement.blur()});
  document.getElementById('mainContent')?.addEventListener('scroll',function(){if(A.page==='dash'){const sg=document.getElementById('dashSt');if(sg)sg.classList.toggle('cmp',this.scrollTop>80)}});

  const saved=localStorage.getItem('ras_user');
  if(saved&&saved!=='admin'){const d=await DB.get(saved);if(d){A.loginAs(saved);return}}
  document.getElementById('loginPage').style.display='flex'
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
init();

</script>
